<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&amp;D Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <style>
    :root {
      --bg:
        radial-gradient(circle at top left, rgba(24, 72, 114, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(16, 133, 149, 0.08), transparent 24%),
        linear-gradient(180deg, #f7f9fc 0%, #edf2f7 100%);
      --surface: rgba(255, 255, 255, 0.95);
      --border: #d8e2ec;
      --title: #0f2438;
      --text: #274158;
      --muted: #6d8094;
      --navy: #1f4e79;
      --shadow-sm: 0 10px 28px rgba(18, 38, 60, 0.06);
      --shadow-md: 0 18px 42px rgba(18, 38, 60, 0.10);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .dashboard-shell {
      max-width: 1460px;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 18px 22px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, #173553 0%, #27577f 100%);
      color: #ffffff;
      box-shadow: var(--shadow-md);
    }

    .topbar-copy h1 {
      margin: 0;
      font-family: "Manrope", sans-serif;
      font-size: clamp(26px, 3.2vw, 36px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .topbar-copy p {
      margin: 6px 0 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
    }

    .topbar-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .meta-pill {
      min-width: 140px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .meta-pill span {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .meta-pill strong {
      display: block;
      font-family: "Manrope", sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.15;
    }

    .panel {
      border-radius: var(--radius-xl);
      background: var(--surface);
      border: 1px solid rgba(201, 214, 227, 0.8);
      box-shadow: var(--shadow-sm);
    }

    .filter-panel {
      padding: 20px;
      margin-bottom: 18px;
    }

    .filter-toolbar {
      display: none;
    }

    .panel-head {
      margin-bottom: 16px;
    }

    .panel-title {
      margin: 0;
      font-family: "Manrope", sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--title);
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .filters-grid {
      row-gap: 14px;
    }

    .filter-field {
      position: relative;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form-control,
    .form-select {
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background-color: #ffffff;
      color: var(--title);
      font-size: 14px;
      box-shadow: none;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: rgba(31, 78, 121, 0.42);
      box-shadow: 0 0 0 4px rgba(31, 78, 121, 0.08);
    }

    .form-control::-webkit-calendar-picker-indicator {
      opacity: 0.7;
    }

    .btn-reset {
      min-height: 48px;
      border: 1px solid rgba(31, 78, 121, 0.22);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f3f7fb 100%);
      color: var(--navy);
      font-weight: 700;
    }

    .btn-reset:hover {
      background: #edf4fb;
      color: var(--title);
      border-color: rgba(31, 78, 121, 0.30);
    }

    .chart-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 14px;
      padding: 0 2px;
    }

    .chart-section-head h2 {
      margin: 0;
      font-family: "Manrope", sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--title);
    }

    .chart-section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .chart-grid {
      row-gap: 18px;
    }

    .chart-card {
      position: relative;
      height: 100%;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid rgba(201, 214, 228, 0.88);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .chart-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, rgba(31, 78, 121, 0.95), rgba(23, 128, 141, 0.7));
    }

    .chart-shell {
      height: 290px;
      position: relative;
      padding-top: 6px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    @media (max-width: 991px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .topbar-meta {
        width: 100%;
        justify-content: flex-start;
      }

      .meta-pill {
        flex: 1 1 180px;
      }
    }

    @media (max-width: 767px) {
      .dashboard-shell {
        padding: 12px 10px 20px;
      }

      .topbar,
      .filter-panel,
      .chart-card {
        border-radius: 18px;
      }

      .topbar {
        padding: 16px;
      }

      .filter-panel {
        padding: 16px;
      }

      .filter-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .filter-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        padding: 0 14px;
        border: 1px solid rgba(31, 78, 121, 0.18);
        border-radius: 12px;
        background: #f6f9fc;
        color: var(--navy);
        font-size: 13px;
        font-weight: 700;
      }

      .filter-toggle .toggle-icon {
        font-size: 16px;
        line-height: 1;
      }

      .filter-panel.collapsed .panel-head,
      .filter-panel.collapsed .filters-grid {
        display: none;
      }

      .panel-head {
        margin-bottom: 12px;
      }

      .filters-grid {
        row-gap: 12px;
      }

      .filter-field {
        padding: 10px 12px 12px;
        border: 1px solid rgba(216, 226, 236, 0.9);
        border-radius: 14px;
        background: #f9fbfd;
      }

      .field-label {
        margin-bottom: 6px;
        font-size: 11px;
      }

      .form-control,
      .form-select {
        min-height: 44px;
        border-radius: 12px;
        font-size: 13px;
      }

      .btn-reset {
        min-height: 44px;
        border-radius: 12px;
      }

      .chart-section-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .chart-section-head p {
        text-align: left;
      }

      .chart-shell {
        height: 320px;
      }

      .meta-pill {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-shell">
    <section class="topbar">
      <div class="topbar-copy">
        <h1>S&amp;D Dashboard</h1>
        <p>Monthly performance trends across field hierarchy</p>
      </div>

      <div class="topbar-meta">
        <div class="meta-pill">
          <span>Window</span>
          <strong id="heroWindow">Last 13 Months</strong>
        </div>
        <div class="meta-pill">
          <span>Months</span>
          <strong id="heroMonths">0</strong>
        </div>
        <div class="meta-pill">
          <span>Scope</span>
          <strong id="heroScope">All Teams</strong>
        </div>
      </div>
    </section>

    <section class="panel filter-panel">
      <div class="filter-toolbar">
        <strong class="panel-title">Filters</strong>
        <button id="filterToggle" class="filter-toggle" type="button" onclick="toggleFilters()">
          <span>Show Filters</span>
          <span class="toggle-icon">+</span>
        </button>
      </div>

      <div class="panel-head">
        <h2 class="panel-title">Filters</h2>
        <p class="panel-subtitle">Select hierarchy and month range</p>
      </div>

      <div class="row filters-grid">
        <div class="col-xl-2 col-lg-4 col-md-4 col-sm-6">
          <div class="filter-field">
            <label class="field-label" for="rsm">RSM</label>
            <select id="rsm" class="form-select">
              <option value="">All RSM</option>
            </select>
          </div>
        </div>

        <div class="col-xl-2 col-lg-4 col-md-4 col-sm-6">
          <div class="filter-field">
            <label class="field-label" for="asm">ASM</label>
            <select id="asm" class="form-select">
              <option value="">All ASM</option>
            </select>
          </div>
        </div>

        <div class="col-xl-2 col-lg-4 col-md-4 col-sm-6">
          <div class="filter-field">
            <label class="field-label" for="so">SO</label>
            <select id="so" class="form-select">
              <option value="">All SO</option>
            </select>
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
          <div class="filter-field">
            <label class="field-label" for="monthFrom">From</label>
            <input type="month" id="monthFrom" class="form-control">
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
          <div class="filter-field">
            <label class="field-label" for="monthTo">To</label>
            <input type="month" id="monthTo" class="form-control">
          </div>
        </div>

        <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
          <div class="filter-field">
            <label class="field-label d-block">&nbsp;</label>
            <button class="btn btn-reset w-100" type="button" onclick="clearFilters()">Reset Filters</button>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="chart-section-head">
        <h2>Monthly KPI Trends</h2>
        <p>Responsive view for desktop and mobile</p>
      </div>

      <div class="row chart-grid">
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="ols"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="tc"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="pc"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="percent"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="ubo"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="ubop"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="secval"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="secvol"></canvas></div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6">
          <div class="chart-card">
            <div class="chart-shell"><canvas id="lpc"></canvas></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    Chart.defaults.devicePixelRatio = 2;

    const API = "https://opensheet.elk.sh/1IaCUbc4ZRlx8DPGRVghrVs1BNdFRGDQRoz76GweYZdA/Sheet1";

    let dataAll = [];
    let charts = {};

    const colors = {
      ols: "#2f6ea5",
      tc: "#ea8f39",
      pc: "#2f9b67",
      percent: "#6c63c9",
      ubo: "#ca6268",
      ubop: "#11828f",
      secval: "#c89b2f",
      secvol: "#8a6d57",
      lpc: "#5e55a9"
    };

    function cleanNumber(val) {
      if (!val) return 0;
      return parseFloat(val.toString().replace(/,/g, "")) || 0;
    }

    function parseDate(val) {
      const [m, y] = val.split("-");
      const map = { Jan: 0, Feb: 1, Mar: 2, Apr: 3, May: 4, Jun: 5, Jul: 6, Aug: 7, Sep: 8, Oct: 9, Nov: 10, Dec: 11 };
      return new Date(2000 + parseInt(y, 10), map[m], 1);
    }

    function format(d) {
      return d.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
    }

    function isMobileView() {
      return window.innerWidth < 768;
    }

    function uniq(arr) {
      return [...new Set(arr)].filter(Boolean);
    }

    function fillSelect(id, arr, label) {
      const el = document.getElementById(id);
      const current = el.value;
      el.innerHTML = `<option value="">All ${label}</option>` + arr.map(v => `<option value="${v}">${v}</option>`).join("");
      if (arr.includes(current)) el.value = current;
    }

    function setDefault() {
      let sorted = dataAll.map(r => r.date).sort((a, b) => a - b);
      let last = sorted.at(-1);

      let from = new Date(last);
      from.setMonth(from.getMonth() - 12);

      monthFrom.value = toInput(from);
      monthTo.value = toInput(last);
    }

    function toInput(d) {
      return d.toISOString().slice(0, 7);
    }

    function getMonthDate(val) {
      if (!val) return null;
      let [y, m] = val.split("-");
      return new Date(y, m - 1, 1);
    }

    function getData() {
      let from = getMonthDate(monthFrom.value);
      let to = getMonthDate(monthTo.value);

      return dataAll.filter(r => {
        return (
          (!rsm.value || r["Current RSM"] == rsm.value) &&
          (!asm.value || r["Current ASM"] == asm.value) &&
          (!so.value || r["SO"] == so.value) &&
          (!from || r.date >= from) &&
          (!to || r.date <= to)
        );
      });
    }

    function aggregate(data) {
      let g = {};

      data.forEach(r => {
        let k = r.date.getTime();

        if (!g[k]) {
          g[k] = { date: r.date, TC: 0, PC: 0, ols: 0, ubo: 0, secval: 0, secvol: 0, tlsd: 0 };
        }

        g[k].TC += cleanNumber(r["TC"]);
        g[k].PC += cleanNumber(r["PC"]);
        g[k].ols += cleanNumber(r["No of Ols"]);
        g[k].ubo += cleanNumber(r["UBO"]);
        g[k].secval += cleanNumber(r["Sec Value"]);
        g[k].secvol += cleanNumber(r["Sec Volume"]);
        g[k].tlsd += cleanNumber(r["TLSD"]);
      });

      return Object.values(g).sort((a, b) => a.date - b.date).map(x => ({
        label: format(x.date),
        tc: x.TC,
        pc: x.PC,
        ols: x.ols,
        ubo: x.ubo,
        percent: x.TC ? Math.round((x.PC / x.TC) * 100) : 0,
        ubop: x.ols ? Math.round((x.ubo / x.ols) * 100) : 0,
        secval: x.secval,
        secvol: x.secvol,
        lpc: x.PC ? parseFloat((x.tlsd / x.PC).toFixed(1)) : 0
      }));
    }

    function updateHeaderMeta(data) {
      document.getElementById("heroMonths").textContent = data.length;

      const from = monthFrom.value ? new Date(monthFrom.value + "-01") : null;
      const to = monthTo.value ? new Date(monthTo.value + "-01") : null;
      const fromLabel = from ? format(from) : "Start";
      const toLabel = to ? format(to) : "End";
      document.getElementById("heroWindow").textContent = from && to ? fromLabel + " - " + toLabel : "Last 13 Months";

      const scope = so.value || asm.value || rsm.value || "All Teams";
      document.getElementById("heroScope").textContent = scope;
    }

    function isFilterPanelCollapsed() {
      return document.querySelector(".filter-panel")?.classList.contains("collapsed");
    }

    function syncFilterToggle() {
      const toggle = document.getElementById("filterToggle");
      const panel = document.querySelector(".filter-panel");
      if (!toggle || !panel) return;

      const label = toggle.querySelector(".toggle-text");
      const icon = toggle.querySelector(".toggle-icon");

      if (!isMobileView()) {
        panel.classList.remove("collapsed");
        label.textContent = "Filters";
        icon.textContent = "-";
        return;
      }

      const collapsed = isFilterPanelCollapsed();
      label.textContent = collapsed ? "Show Filters" : "Hide Filters";
      icon.textContent = collapsed ? "+" : "-";
    }

    function toggleFilters() {
      const panel = document.querySelector(".filter-panel");
      if (!panel || !isMobileView()) return;
      panel.classList.toggle("collapsed");
      syncFilterToggle();
    }

    function cascadeASM() {
      let filtered = dataAll.filter(r => !rsm.value || r["Current RSM"] == rsm.value);
      fillSelect("asm", uniq(filtered.map(r => r["Current ASM"])), "ASM");
      fillSelect("so", [], "SO");
      asm.value = "";
      so.value = "";
    }

    function cascadeSO() {
      let filtered = dataAll.filter(r =>
        (!rsm.value || r["Current RSM"] == rsm.value) &&
        (!asm.value || r["Current ASM"] == asm.value)
      );
      fillSelect("so", uniq(filtered.map(r => r["SO"])), "SO");
      so.value = "";
    }

    function initFilters() {
      fillSelect("rsm", uniq(dataAll.map(r => r["Current RSM"])), "RSM");
      fillSelect("asm", [], "ASM");
      fillSelect("so", [], "SO");

      rsm.onchange = () => { cascadeASM(); updateCharts(); };
      asm.onchange = () => { cascadeSO(); updateCharts(); };
      so.onchange = updateCharts;
      monthFrom.onchange = updateCharts;
      monthTo.onchange = updateCharts;
    }

    function labelFormatter(value, isPercent, chartData, index, mobile) {
      const total = chartData.length;

      if (mobile) {
        if (total > 10 && index % 3 !== 0 && index !== total - 1) return null;
        if (total > 6 && total <= 10 && index % 2 !== 0 && index !== total - 1) return null;
      }

      return isPercent ? value + "%" : value.toLocaleString("en-IN");
    }

    function draw(id, label, key, isPercent = false) {
      let data = aggregate(getData());
      let mobile = isMobileView();

      if (charts[id]) charts[id].destroy();

      charts[id] = new Chart(document.getElementById(id), {
        type: "line",
        data: {
          labels: data.map(x => x.label),
          datasets: [{
            data: data.map(x => x[key]),
            borderColor: colors[id],
            backgroundColor: colors[id] + "20",
            fill: true,
            tension: 0.38,
            borderWidth: 3,
            pointRadius: mobile ? 2.5 : 4,
            pointHoverRadius: mobile ? 4 : 6,
            pointBackgroundColor: colors[id],
            pointBorderColor: "#ffffff",
            pointBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: {
            mode: "index",
            intersect: false
          },
          layout: {
            padding: {
              top: mobile ? 34 : 12,
              right: mobile ? 10 : 10,
              left: mobile ? 4 : 6,
              bottom: 0
            }
          },
          scales: {
            x: {
              grid: {
                display: false
              },
              ticks: {
                color: "#68809b",
                font: {
                  size: mobile ? 10 : 11,
                  weight: "600"
                },
                maxRotation: 0,
                autoSkip: true
              }
            },
            y: {
              beginAtZero: true,
              grace: mobile ? "22%" : "12%",
              grid: {
                color: "rgba(154, 174, 194, 0.18)",
                drawBorder: false
              },
              ticks: {
                color: "#68809b",
                font: {
                  size: mobile ? 10 : 11,
                  weight: "600"
                },
                callback: value => isPercent ? value + "%" : value.toLocaleString("en-IN")
              }
            }
          },
          plugins: {
            legend: {
              display: false
            },
            title: {
              display: true,
              text: label,
              align: "start",
              color: "#11263c",
              padding: {
                top: 8,
                bottom: 16
              },
              font: {
                size: mobile ? 13 : 15,
                weight: "700",
                family: "Manrope"
              }
            },
            tooltip: {
              backgroundColor: "rgba(17, 38, 60, 0.94)",
              titleColor: "#ffffff",
              bodyColor: "#dbe7f3",
              borderColor: "rgba(255, 255, 255, 0.10)",
              borderWidth: 1,
              padding: 12,
              callbacks: {
                label: ctx => isPercent ? ctx.raw + "%" : ctx.raw.toLocaleString("en-IN")
              }
            },
            datalabels: {
              display: true,
              anchor: "end",
              align: function(context) {
                if (!mobile) return "top";
                return context.dataIndex % 2 === 0 ? "top" : "right";
              },
              offset: function(context) {
                if (!mobile) return 4;
                return context.dataIndex % 2 === 0 ? 6 : 8;
              },
              clamp: true,
              clip: false,
              color: mobile ? "#ffffff" : "#334e68",
              backgroundColor: mobile ? "rgba(17, 38, 60, 0.88)" : null,
              borderRadius: mobile ? 6 : 0,
              padding: mobile ? { top: 3, right: 5, bottom: 3, left: 5 } : 0,
              font: {
                weight: "700",
                size: mobile ? 8 : 10
              },
              formatter: function(v, context) {
                return labelFormatter(v, isPercent, context.dataset.data, context.dataIndex, mobile);
              }
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function updateCharts() {
      const aggregated = aggregate(getData());
      updateHeaderMeta(aggregated);
      draw("ols", "No of Ols", "ols");
      draw("tc", "TC", "tc");
      draw("pc", "PC", "pc");
      draw("percent", "PC%", "percent", true);
      draw("ubo", "UBO", "ubo");
      draw("ubop", "UBO %", "ubop", true);
      draw("secval", "Sec Value", "secval");
      draw("secvol", "Sec Volume", "secvol");
      draw("lpc", "LPC", "lpc");
    }

    function clearFilters() {
      rsm.value = "";
      asm.value = "";
      so.value = "";
      fillSelect("asm", [], "ASM");
      fillSelect("so", [], "SO");
      setDefault();
      updateCharts();
    }

    fetch(API)
      .then(res => res.json())
      .then(data => {
        dataAll = data.map(r => ({
          ...r,
          date: parseDate(r["Month"])
        })).filter(r => r.date);

        initFilters();
        setDefault();
        updateCharts();
      });

    window.addEventListener("resize", () => {
      clearTimeout(window.__chartResizeTimer);
      syncFilterToggle();
      window.__chartResizeTimer = setTimeout(updateCharts, 180);
    });

    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.getElementById("filterToggle");
      if (toggle) {
        toggle.innerHTML = '<span class="toggle-text">Show Filters</span><span class="toggle-icon">+</span>';
      }

      if (isMobileView()) {
        document.querySelector(".filter-panel")?.classList.add("collapsed");
      }
      syncFilterToggle();
    });
  </script>
</body>
</html>
