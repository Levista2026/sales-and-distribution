<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S&D Login</title>
  <style>
    :root {
      --bg: #e7eef5;
      --card: #ffffff;
      --text: #102a43;
      --muted: #5f7897;
      --primary: #1f4d7a;
      --border: #c9d8e6;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #f4f8fc 0%, var(--bg) 45%, #dbe6f0 100%);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }
    .card {
      width: min(460px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 14px 28px rgba(15, 40, 65, 0.1);
    }
    h1 { margin: 0 0 8px; }
    p { margin: 0 0 18px; color: var(--muted); }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid #9cb5cb;
      border-radius: 12px;
      padding: 0 12px;
      font-size: 15px;
    }
    button {
      margin-top: 6px;
      width: 100%;
      height: 44px;
      border-radius: 12px;
      border: 0;
      background: linear-gradient(135deg, #1f4d7a 0%, #2e6a9d 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    #msg { margin-top: 10px; min-height: 20px; font-size: 14px; color: var(--danger); }
  </style>
</head>
<body>
  <main class="card">
    <h1>S&D Dashboard</h1>
    <p>Sign in to continue</p>
    <form id="loginForm">
      <div class="field">
        <label for="username">Email</label>
        <input id="username" type="email" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Login</button>
      <p id="msg"></p>
    </form>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./login.js"></script>
</body>
</html>
